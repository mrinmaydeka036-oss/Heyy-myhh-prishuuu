<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>For My Future Wife ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<audio id="music" src="love.mp3"></audio>

<section id="home" class="page active">

<h3 class="topTitle">
A LETTER FOR YOU
</h3>

<h1 class="title">
Open when you're ready
</h1>

<div id="envelope">

<div class="back"></div>

<div class="letter">

<h2>For You ❤️</h2>

</div>

<div class="flap"></div>

<div class="seal">
❤️
</div>

</div>

<p class="tap">
Tap the Envelope
</p>

</section>

<section id="letterPage" class="page">

<div class="paper">

<h1>
My Love ❤️
</h1>

<p id="typing"></p>

<button id="next">

Continue ❤️

</button>

</div>

</section>

<section id="questionPage" class="page">

<div class="popup">

<h1>

Do You Love Me?

</h1>

<p>

Just one honest answer...

</p>

<button id="yes">

YES ❤️

</button>

</div>

</section>

<section id="videoPage" class="page">

<video
id="video"
playsinline
preload="auto">

<source src="Video.mp4">

</video>

</section>

<section id="finalPage" class="page">

<h1>

I LOVE YOU FOREVER ❤️

</h1>

<p>

Your Future Husband

</p>

</section>

<script src="script.js"></script>

</body>
  </html>
